<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,60,60,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 700px;
    width: 100%;
  }

  .four-o-four {
    font-family: 'Space Mono', monospace;
    font-size: clamp(120px, 22vw, 220px);
    font-weight: 700;
    line-height: 0.85;
    letter-spacing: -8px;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(255,255,255,0.15);
    position: relative;
    user-select: none;
    animation: flicker 6s ease-in-out infinite;
  }

  .four-o-four::after {
    content: '404';
    position: absolute;
    inset: 0;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(255, 55, 55, 0.5);
    clip-path: polygon(0 45%, 100% 45%, 100% 55%, 0 55%);
    transform: translateX(3px);
    animation: glitch 3s ease-in-out infinite;
  }

  @keyframes glitch {
    0%, 90%, 100% { transform: translateX(0); opacity: 0; }
    92% { transform: translateX(-4px); opacity: 1; clip-path: polygon(0 20%, 100% 20%, 100% 35%, 0 35%); }
    94% { transform: translateX(4px); opacity: 1; clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%); }
    96% { transform: translateX(-2px); opacity: 0.6; clip-path: polygon(0 45%, 100% 45%, 100% 55%, 0 55%); }
    98% { transform: translateX(0); opacity: 0; }
  }

  @keyframes flicker {
    0%, 97%, 100% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
    99.5% { opacity: 0.6; }
  }

  .divider {
    width: 60px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 2rem auto;
    position: relative;
    overflow: visible;
  }

  .divider::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,55,55,0.7);
  }

  .headline {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    margin-bottom: 0.75rem;
  }

  .subtext {
    font-family: 'Space Mono', monospace;
    font-size: clamp(11px, 1.5vw, 13px);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
    margin-bottom: 3rem;
    line-height: 1.8;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.8);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.04);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .btn:hover::before { transform: scaleX(1); }
  .btn:hover { border-color: rgba(255,55,55,0.5); color: #fff; }

  .arrow { font-style: normal; transition: transform 0.2s; display: inline-block; }
  .btn:hover .arrow { transform: translateX(4px); }

  .status-bar {
    margin-top: 4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,55,55,0.6);
    display: inline-block;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .status-sep {
    width: 1px;
    height: 12px;
    background: rgba(255,255,255,0.1);
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="container">
    <div class="four-o-four">404</div>

    <div class="divider"></div>

    <p class="headline">Page not found</p>
    <p class="subtext">
      The page you're looking for doesn't exist,<br>
      was moved, or never existed at all.
    </p>

    <a class="btn" href="/" onclick="history.back(); return false;">
      <span>&#8592;</span>
      Go back home
      <span class="arrow">&#8594;</span>
    </a>

    <div class="status-bar">
      <span class="status-dot"></span>
      <span>ERROR_CODE: 404</span>
      <div class="status-sep"></div>
      <span>STATUS: NOT_FOUND</span>
      <div class="status-sep"></div>
      <span>SYS: ACTIVE</span>
    </div>
  </div>
</body>
</html>
